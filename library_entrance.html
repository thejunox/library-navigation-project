<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Library Entrance</title>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background-color: #f4f4f4;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.15);
}

h1 {
  color: #222;
}

p {
  font-size: 18px;
  color: #444;
}

.image-wrapper{
  position:relative;
  display:inline-block;
}

.image-wrapper img{
  border: 3px solid #333;
  border-radius: 8px;
  margin-top: 15px;
  max-width: 50%;
  height: auto;
}


.marker{
  position:absolute;
  background:#2a6df4;
  color:white;
  font-weight:bold;
  padding:6px 10px;
  border-radius:6px;
  font-size:10px;
}


.library-marker{
  left:30%;
  top:20%;
}

.btn {
  display: inline-block;
  margin: 15px 10px 0;
  padding: 12px 20px;
  background-color: #333;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  font-size: 16px;
}

.btn:hover {
  background-color: #555;
}

</style>
</head>

<body>

<div class="container">

<h1>Library Entrance</h1>
<p>Click on the door to enter the Library.</p>

<div class="image-wrapper">

<img src="images/dg01.jpg"
alt="Library Entrance"
usemap="#libraryDoorMap"
width="1541"
height="2048" />


<div class="marker library-marker" onclick="location.href='library_inside.html'">📍 Enter Library</div>

<map name="libraryDoorMap">
<area
shape="rect"
coords="28,221,273,683"
href="library_inside.html"
alt="Enter Library"
title="Enter Library"
/>
</map>

</div>

<a class="btn" href="index.html">Back to Home</a>

</div>

</body>
</html>
